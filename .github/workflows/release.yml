name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}"
          }
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          "GOLEM_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Signing is opt-in: if neither a PFX path nor a certificate
          # SHA1 is configured, the build script sets GOLEM_SKIP_SIGNING
          # and the artifact is uploaded unsigned. This keeps CI green
          # for forks and public PRs while leaving a real sign path for
          # the maintainer.
          if (-not $env:GOLEM_SIGN_PFX_PATH -and -not $env:GOLEM_SIGN_CERT_SHA1) {
            "GOLEM_SKIP_SIGNING=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build Windows release artifacts
        shell: pwsh
        run: .\release_windows.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/releases/windows/GOLEM-*-windows.exe
            dist/releases/windows/GOLEM-*-windows-installer.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          fi
          {
            echo "GOLEM_VERSION=$VERSION"
          } >> "$GITHUB_ENV"
          # macOS code signing + notarization is opt-in. Provide
          # MACOS_CERT_P12_BASE64 (base64 of the Developer ID .p12),
          # MACOS_CERT_PASSWORD, and the notarization secrets to enable.
          # Without them the build script signs the .app ad-hoc and
          # skips notarization (suitable for internal testing only).
          if [[ -z "$MACOS_CERT_P12_BASE64" ]]; then
            echo "GOLEM_SKIP_SIGNING=1" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build macOS release artifacts
        run: ./release_macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/releases/macos/GOLEM-*-macOS.dmg
          if-no-files-found: error

  publish-release:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-artifacts/macos

      - name: Generate SHA256 checksums
        working-directory: release-artifacts
        run: |
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.tar.gz" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create source archive
        working-directory: release-artifacts
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          mkdir -p source
          git archive --format=tar.gz --prefix="GOLEM-${VERSION}/" -o "source/GOLEM-${VERSION}-source.tar.gz" ${{ github.sha }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: golem.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.tar.gz
            release-artifacts/**/SHA256SUMS.txt
            release-artifacts/**/golem.spdx.json
          generate_release_notes: true
          draft: ${{ github.event_name != 'push' }}

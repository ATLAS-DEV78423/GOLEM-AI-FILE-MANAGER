name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}"
          }
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          "GOLEM_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (-not $env:GOLEM_SIGN_PFX_PATH -and -not $env:GOLEM_SIGN_CERT_SHA1) {
            "GOLEM_SKIP_SIGNING=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build Windows release artifacts
        shell: pwsh
        run: .\release_windows.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/releases/windows/GOLEM-*-windows.exe
            dist/releases/windows/GOLEM-*-windows-installer.exe
          if-no-files-found: error

  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          fi
          echo "GOLEM_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build macOS release artifacts (x86_64)
        run: GOLEM_ARCH=x86_64 ./build_macos.sh

      - name: Upload macOS x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-release
          path: dist/GOLEM-macOS-x86_64.dmg
          if-no-files-found: error

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          fi
          echo "GOLEM_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build macOS release artifacts (arm64)
        run: GOLEM_ARCH=arm64 ./build_macos.sh

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release
          path: dist/GOLEM-macOS-arm64.dmg
          if-no-files-found: error

  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          fi
          echo "GOLEM_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Build Linux release artifacts (x86_64)
        run: GOLEM_ARCH=x86_64 ./build_linux_installer.sh

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-release
          path: |
            dist/GOLEM-*-linux-x86_64.tar.gz
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn

  build-linux-aarch64:
    # aarch64 Linux builds require an ARM64 runner. GitHub-hosted ARM64
    # Linux runners are available via the `ubuntu-24.04-arm` image.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          fi
          echo "GOLEM_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Build Linux release artifacts (aarch64)
        run: GOLEM_ARCH=aarch64 ./build_linux_installer.sh

      - name: Upload Linux aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-release
          path: |
            dist/GOLEM-*-linux-aarch64.tar.gz
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn

  publish-release:
    needs:
      - build-windows
      - build-macos-x86_64
      - build-macos-arm64
      - build-linux-x86_64
      - build-linux-aarch64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Organize artifacts for release
        run: |
          mkdir -p release-artifacts/compiled
          # Flatten all artifact directories into a single directory
          find release-artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release-artifacts/compiled/ \;

      - name: Generate SHA256 checksums
        working-directory: release-artifacts/compiled
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create source archive
        working-directory: release-artifacts
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          mkdir -p source
          git archive --format=tar.gz --prefix="GOLEM-${VERSION}/" -o "source/GOLEM-${VERSION}-source.tar.gz" ${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/compiled/*
          generate_release_notes: true
          draft: ${{ github.event_name != 'push' }}

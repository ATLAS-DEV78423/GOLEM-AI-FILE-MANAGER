name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy golem/

      - name: Test
        run: pytest -v --tb=short --cov=golem --cov-report=xml --cov-fail-under=40

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: build (${{ matrix.os }}, ${{ matrix.arch }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
            build_script: ./build_windows_installer.ps1
            artifact_name: windows-x86_64
            upload_pattern: |
              dist/GOLEM/GOLEM.exe
              dist/GOLEM-Setup*.exe
          - os: macos-latest
            arch: x86_64
            build_script: GOLEM_ARCH=x86_64 bash ./build_macos.sh
            artifact_name: macos-x86_64
            upload_pattern: |
              dist/GOLEM.app/*
              dist/GOLEM-macOS-x86_64.dmg
          - os: macos-latest
            arch: arm64
            build_script: GOLEM_ARCH=arm64 bash ./build_macos.sh
            artifact_name: macos-arm64
            upload_pattern: |
              dist/GOLEM.app/*
              dist/GOLEM-macOS-arm64.dmg
          - os: ubuntu-latest
            arch: x86_64
            build_script: GOLEM_ARCH=x86_64 bash ./build_linux_installer.sh
            artifact_name: linux-x86_64
            upload_pattern: |
              dist/GOLEM-*-linux-x86_64.tar.gz
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install -e .

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Diagnose environment
        if: runner.os != 'Windows'
        run: |
          echo "=== Python ==="
          which python || echo "python: NOT FOUND"
          echo "---"
          python --version
          echo "=== PyInstaller ==="
          python -m PyInstaller --version || echo "PyInstaller: NOT AVAILABLE via python"
          echo "=== PATH ==="
          echo "$PATH" | tr ':' '\n'

      - name: Build
        env:
          PYTHON_BIN: python
        run: |
          ${{ matrix.build_script }} 2>&1 | tee "${{ runner.temp }}/build-output.log"

      - name: Upload build log (always)
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-build-log
          path: ${{ runner.temp }}/build-output.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: ${{ matrix.upload_pattern }}
          if-no-files-found: warn

  smoke:
    name: smoke (${{ matrix.arch }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            artifact_name: linux-x86_64
          - os: windows-latest
            arch: x86_64
            artifact_name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: dist

      - name: Install dependencies for smoke test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install -r requirements.txt

      - name: Install prerequisites for smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pip install -r requirements.txt

      - name: Run smoke test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x scripts/smoke_test_e2e.sh
          # Find and pass the binary path
          BINARY=$(find dist -type f -name "GOLEM" ! -path "*.AppDir*" -print -quit 2>/dev/null || true)
          if [[ -z "$BINARY" ]]; then
            # Try AppDir
            BINARY=$(find dist -type f -executable -name "GOLEM" -print -quit 2>/dev/null || true)
          fi
          if [[ -z "$BINARY" ]]; then
            echo "No binary found in dist/; running Python-level smoke test directly"
            python3 scripts/smoke_test_e2e.sh
          else
            chmod +x "$BINARY"
            python3 scripts/smoke_test_e2e.sh "$BINARY"
          fi

      - name: Run smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $binary = Get-ChildItem -Path dist -Recurse -Filter "GOLEM.exe" | Select-Object -First 1 -ExpandProperty FullName
          if ($binary) {
            & .\scripts\smoke_test_windows.ps1 $binary
          } else {
            Write-Host "No binary found; running Python-level smoke test"
            python3 .\scripts\smoke_test_windows.ps1
          }
